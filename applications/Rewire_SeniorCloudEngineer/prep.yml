# Job-prep manifest — read by interview-prep/build.py (job switcher view).
# Topics reference shared interview-prep/topics/<slug>.md; entries whose slug
# isn't generated yet appear under "Suggested for <job>". Flat key: value lines.
job: Rewire — Senior Cloud Engineer
topics:
  - slug: terraform
    must: true
    rank: 1
    angle: Terraform + Python is the stated core; lead with your 30-day→8-hour region-build automation and reusable-module thinking.
  - slug: aws-eks
    must: true
    rank: 2
    angle: AWS is one of their three clouds — keep cloud-agnostic but be concrete on AWS primitives; bridge from your OCI control-plane depth.
  - slug: cicd
    must: true
    rank: 3
    angle: "Design CI/CD pipelines" is a core responsibility — map your Jenkins/Test-Service work to pipeline stages and IaC delivery.
  - slug: distributed-systems
    must: true
    rank: 4
    angle: They build "event-driven systems at scale" — frame from queues/pub-sub and your live-migration sequencing/guardrails.
  - slug: reliability-incident
    must: true
    rank: 5
    angle: Secure, scalable, reliable infra is the whole job — use 34 regions, 68.4% capacity cut, on-call 10/wk→0.
  - slug: rag-search
    rank: 6
    angle: Rewire is a Data & AI shop — your Ops Copilot (hybrid BM25/vector, embeddings) is the bridge to "infrastructure ML/AI workloads run on".
  - slug: kubernetes
    rank: 7
    angle: Container platform fluency for serverless/ML workloads; keep it foundational.
  - slug: api-design
    rank: 8
    angle: Your V2 admin API (16 resources, DTO layer) shows platform/service design — "core infrastructure, platforms, and services".
  - slug: azure
    title: Microsoft Azure
    rank: 9
    why: one of Rewire's three clouds — core services, AKS, networking, Entra ID (gap — learn)
  - slug: gcp
    title: Google Cloud Platform (GCP)
    rank: 10
    why: one of Rewire's three clouds — GKE, IAM, VPC, Cloud Run (gap — learn)
  - slug: serverless-event-driven
    title: Serverless & Event-driven Architecture
    rank: 11
    why: JD core — Lambda/Functions/Cloud Run, queues, pub/sub, event sourcing (gap — learn)
  - slug: mlops-ai-infra
    title: Infrastructure for AI/ML Workloads (MLOps)
    rank: 12
    why: the platforms ML/AI run on — pipelines, serving, GPUs; map from your RAG/Ops Copilot (gap — learn)
  - slug: cloud-networking-security
    title: Cloud Networking & Security Foundations
    rank: 13
    why: JD names "networking, security" — VPC, ingress, IAM, mTLS (you have mTLS/RBAC) (revision candidate)
