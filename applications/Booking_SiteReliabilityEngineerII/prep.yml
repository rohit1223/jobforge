# Job-prep manifest — read by interview-prep/build.py (job switcher view).
# Topics reference shared interview-prep/topics/<slug>.md; entries whose slug
# isn't generated yet appear under "Suggested for <job>". Flat key: value lines.
job: Booking.com — Site Reliability Engineer II
topics:
  - slug: reliability-incident
    must: true
    rank: 1
    angle: SRE core — "treat ops as a software problem". Lead with on-call 10+/wk→0, incident-context automation (20% faster MTTR), and SLIs/SLOs/error budgets; be ready to define SLA vs SLO crisply.
  - slug: distributed-systems
    must: true
    rank: 2
    angle: "Build/operate scalable distributed systems across multinational data centers" — frame your 34-region API Gateway and multi-region reliability design.
  - slug: terraform
    must: true
    rank: 3
    angle: IaC is a named must — your 30d→8h Terraform region-build automation is the headline.
  - slug: core-backend
    must: true
    rank: 4
    angle: "Solve algorithmic problems in a backend language" — they screen coding in Java/Python; keep answers language-agnostic but show backend depth.
  - slug: observability
    must: true
    rank: 5
    angle: "Build monitoring, handle outages." Their stack is Prometheus + Grafana (+ Kibana/Graphite); bridge from your Grafana/Datadog and explain metrics/alerting/SLO dashboards.
  - slug: aws-eks
    must: true
    rank: 6
    angle: "Knowledge of cloud computing fundamentals" + AWS in their stack — cover AWS/cloud primitives (compute, networking, IAM), not just EKS.
  - slug: kubernetes
    rank: 7
    angle: Named nice-to-have orchestration tool — expect cluster-ops and self-healing questions.
  - slug: redis-and-caching
    rank: 8
    angle: Your Redis state-tier live-migration shows stateful-service reliability under production guardrails.
  - slug: cicd
    rank: 9
    angle: "Develop tools to help product teams deploy 1000s of change sets/day" — frame deploy tooling, safe rollouts, and automation.
  - slug: api-design
    rank: 10
    angle: Service-ownership angle — your V2 admin-plane API and self-service management APIs.
  - slug: ai-sre-agents
    title: AI SRE Agents & Autonomous Incident Triage
    rank: 11
    why: Your Jira Severity Controller / autonomous SRE agent is now on the resume — defend its design, safety guardrails (dry-run, whitelisting, re-escalation), and customer-impact detection (revision)
  - slug: slos-error-budgets
    title: SLOs, Error Budgets & Alerting
    rank: 12
    why: JD requires SLA/SLO understanding — you now show SLOs + binomial alarm-threshold tuning; sharpen error-budget/burn-rate vocabulary and SLA-vs-SLO framing (revision)
  - slug: algorithms-data-structures
    title: Algorithms & Data Structures
    rank: 13
    why: Booking SRE screens algorithmic coding in a backend language — refresh complexity analysis and common patterns (revision)
  - slug: openstack
    title: OpenStack
    rank: 14
    why: open-source infra orchestration named alongside Kubernetes; nice-to-have (gap — learn)
